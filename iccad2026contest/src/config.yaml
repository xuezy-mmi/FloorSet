
data:
  train_path: "/home/xzy/eda//FloorSet/train"   # TODO
  val_path: "/path/to/FloorSet/val"
  max_blocks: 120
  batch_size: 32

graph:
  node_feat_dim: 64
  edge_feat_dim: 1
  hidden_dim: 256
  num_gnn_layers: 4

diffusion:
  timesteps: 1000
  schedule: "cosine"
  inference_steps: 50

transformer:
  dim: 256
  depth: 12
  heads: 8
  cond_dim: 256

training:
  epochs: 100
  lr: 1e-4
  weight_decay: 0.01
  aux_loss_weight: 0.1
  mixed_precision: true

inference:
  guidance_strength: 0.1
  use_postprocess: true